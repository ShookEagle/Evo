name: Nightly
on:
  # Every Wednesday at 00:00 UTC
  schedule:
    - cron: "0 0 * * 3"
  
  push:
  pull_request: 

  # Allows Manual Trigger
  workflow_dispatch:
    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
    
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOTNET_VERSION: "8.0.x"
      PLUGIN_DLL_NAME: "Evo.dll"
      ZIP_NAME: "Evo.zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          show-progress: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: |
          set -e
          CSPROJ="$(git ls-files '*.csproj' | head -n1)"
          echo "Using project: $CSPROJ"
          dotnet publish "$CSPROJ" -c Release -o out

      - name: Stage
        run: |
          set -e
          CSPROJ="$(git ls-files '*.csproj' | head -n1)"
          PROJDIR="$(dirname "$CSPROJ")"

          mkdir -p dist/plugins/Evo/lang dist/plugins/Evo/config dist/shared/RMenu

          # Plugin DLL
          cp "out/Evo.dll" "dist/plugins/Evo/"

          # Config & lang
          cp -f "$PROJDIR/lang/en.json" "dist/plugins/Evo/lang/"
          cp -f "$PROJDIR/config/maps.json" "dist/plugins/Evo/config/"
          cp -f "$PROJDIR/config/modes.json" "dist/plugins/Evo/config/"
          cp -f "$PROJDIR/config/settings.json" "dist/plugins/Evo/config/"

          # Shared RMenu
          cp -f "$PROJDIR/shared/RMenu.dll" "dist/shared/RMenu/"

          echo "Staged files:"; find dist -maxdepth 3 -type f -print

      - name: Create zip
        working-directory: dist
        run: zip -r "${{ env.ZIP_NAME }}" plugins shared

      - name: Upload build artifact (for CI / debugging)
        uses: actions/upload-artifact@v4
        with:
          name: Evo-zip
          path: dist/${{ env.ZIP_NAME }}
          if-no-files-found: error

  nightly_release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Evo-zip
          path: dist

      - name: Create or Update Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          files: dist/Evo-Nightly.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}